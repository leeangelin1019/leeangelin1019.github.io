# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: 卡拉女巫漫遊世界
email: leeangelin@gmail.com
description: 卡拉女巫，一個因小說《項塔蘭》而起的名字，開啟對世界的嚮往，11年前成為背包客到現在，堅持用少少的錢獨自闖蕩世界，目前走過柬埔寨、泰國、馬來西亞、新加坡、印尼、菲律賓、中國、越南和最喜歡的印度。
twitter_username: 
github_username: leeangelin1019
timezone: Asia/Taipei
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "卡拉女巫"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "卡拉女巫，一個因小說《項塔蘭》而起的名字，開啟對世界的嚮往，11年前成為背包客到現在，堅持用少少的錢獨自闖蕩世界，目前走過柬埔寨、泰國、馬來西亞、新加坡、印尼、菲律賓、中國、越南和最喜歡的印度。"
  links:
    - label: "Blogger"
      icon: "fas fa-fw fa-link"
      url: "https://angelinalee1019.blogspot.com"
    - label: "UDN 旅遊專欄"
      icon: "fas fa-fw fa-newspaper"
      url: "https://travel.udn.com/author/articles/1013/9799"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/@KarlaWitch1990"

footer:
  links:
    - label: "Blogger"
      icon: "fas fa-fw fa-link"
      url: "https://angelinalee1019.blogspot.com"
    - label: "UDN 旅遊專欄"
      icon: "fas fa-fw fa-newspaper"
      url: "https://travel.udn.com/author/articles/1013/9799"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/@KarlaWitch1990"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
